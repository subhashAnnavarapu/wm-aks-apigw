# Simple Deployment Pipeline for AKS
# Logs into Azure, pulls AKS credentials, and deploys using native Helm CLI

trigger:
  - main

variables:
  # ACR Information
  acrName: "wmaksdevsVXS"
  imageRepository: "webmethods-msr_api_gw"
  imageTag: "11.1.3"
  opensearchImageRepository: "webmethods-msr_opensearch"
  opensearchImageTag: "2.19.1"
  dashboardsImageRepository: "webmethods-msr_dashboards"
  dashboardsImageTag: "2.19.1"

  # AKS Information
  aksResourceGroup: "rg-aks-wmaks-dev-eastus2"
  aksClusterName: "wmapigw-dev-aks"

  # Helm Information
  namespace: "webmethods-apigw"
  chartPath: "helm"

jobs:
  - deployment: Deploy
    displayName: "Deploy to AKS"
    pool:
      name: Default
    environment: "subhashAnnavarapuwmaksapps-1655.webmethods"
    strategy:
      runOnce:
        deploy:
          steps:
            - checkout: self

            - task: AzureCLI@2
              displayName: "Azure Login & Set AKS Context"
              inputs:
                azureSubscription: "AzureRM_Connection" # Enter your ARM Service Connection Name here
                scriptType: "ps"
                scriptLocation: "inlineScript"
                inlineScript: |
                  Write-Host "Fetching AKS credentials..."
                  az aks get-credentials --resource-group $(aksResourceGroup) --name $(aksClusterName) --overwrite-existing

            - task: PowerShell@2
              displayName: "Deploy Full Stack via Helm (PowerShell)"
              inputs:
                targetType: "inline"
                script: |
                  Write-Host "Deploying webMethods Gateway, OpenSearch, and Dashboards..."
                  helm upgrade --install wm-msr-full "$(System.DefaultWorkingDirectory)/$(chartPath)" `
                    -f "$(System.DefaultWorkingDirectory)/environments/dev/gateway-values.yaml" `
                    --namespace $(namespace) `
                    --create-namespace
