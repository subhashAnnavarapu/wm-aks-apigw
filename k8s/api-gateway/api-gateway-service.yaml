apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: webmethods-apigw
  labels:
    app: api-gateway
    component: api-gateway
  annotations:
    description: "LoadBalancer service for API Gateway external access"
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 5555
      targetPort: 5555
      protocol: TCP
    - name: https
      port: 5543
      targetPort: 5543
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-internal
  namespace: webmethods-apigw
  labels:
    app: api-gateway
    component: api-gateway
  annotations:
    description: "ClusterIP service for internal API Gateway access"
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 5555
      targetPort: 5555
      protocol: TCP
    - name: https
      port: 5543
      targetPort: 5543
      protocol: TCP
    - name: metrics
      port: 9200
      targetPort: 9200
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-headless
  namespace: webmethods-apigw
  labels:
    app: api-gateway
    component: api-gateway
  annotations:
    description: "Headless service for API Gateway StatefulSet operations"
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 5555
      targetPort: 5555
      protocol: TCP
    - name: https
      port: 5543
      targetPort: 5543
      protocol: TCP
