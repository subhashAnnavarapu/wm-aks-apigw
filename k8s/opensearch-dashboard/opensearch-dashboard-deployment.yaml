apiVersion: v1
kind: Service
metadata:
  name: opensearch-dashboards
  namespace: webmethods-apigw
  labels:
    app: opensearch-dashboards
spec:
  type: ClusterIP
  ports:
    - port: 5601
      targetPort: 5601
      name: http
  selector:
    app: opensearch-dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-dashboards-config
  namespace: webmethods-apigw
data:
  opensearch_dashboards.yml: |
    server.name: opensearch-dashboards
    server.host: "0.0.0.0"
    server.port: 5601
    opensearch.hosts: ["http://opensearch:9200"]
    opensearch.username: "admin"
    opensearch.password: "admin"
    opensearch.ssl.verificationMode: "none"
    logging:
      appenders:
        default:
          type: console

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch-dashboards
  namespace: webmethods-apigw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensearch-dashboards
  template:
    metadata:
      labels:
        app: opensearch-dashboards
    spec:
      containers:
      - name: opensearch-dashboards
        image: wmaksdevsVXS.azurecr.io/webmethods-msr_dashboards:2.19.1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5601
          name: http
        env:
        - name: OPENSEARCH_HOSTS
          value: "http://opensearch:9200"
        - name: OPENSEARCH_USERNAME
          value: "admin"
        - name: OPENSEARCH_PASSWORD
          value: "admin"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: config
          mountPath: /usr/share/opensearch-dashboards/config/opensearch_dashboards.yml
          subPath: opensearch_dashboards.yml
        livenessProbe:
          httpGet:
            path: /app/home
            port: 5601
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /app/home
            port: 5601
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: config
        configMap:
          name: opensearch-dashboards-config
