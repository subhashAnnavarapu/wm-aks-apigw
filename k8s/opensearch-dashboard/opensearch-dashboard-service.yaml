apiVersion: v1
kind: Service
metadata:
  name: opensearch-dashboards
  namespace: webmethods-apigw
  labels:
    app: opensearch-dashboards
    component: opensearch-dashboards
  annotations:
    description: "ClusterIP service for OpenSearch Dashboards access"
spec:
  type: ClusterIP
  selector:
    app: opensearch-dashboards
  ports:
    - name: http
      port: 5601
      targetPort: 5601
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-dashboards-nodeport
  namespace: webmethods-apigw
  labels:
    app: opensearch-dashboards
    component: opensearch-dashboards
  annotations:
    description: "NodePort service for OpenSearch Dashboards external access"
spec:
  type: NodePort
  selector:
    app: opensearch-dashboards
  ports:
    - name: http
      port: 5601
      targetPort: 5601
      protocol: TCP
      nodePort: 30561

---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-dashboards-loadbalancer
  namespace: webmethods-apigw
  labels:
    app: opensearch-dashboards
    component: opensearch-dashboards
  annotations:
    description: "LoadBalancer service for OpenSearch Dashboards external access"
spec:
  type: LoadBalancer
  selector:
    app: opensearch-dashboards
  ports:
    - name: http
      port: 5601
      targetPort: 5601
      protocol: TCP
