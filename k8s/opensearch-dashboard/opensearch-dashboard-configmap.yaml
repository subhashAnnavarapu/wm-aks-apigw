apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-dashboards-config
  namespace: webmethods-apigw
data:
  opensearch_dashboards.yml: |
    server.name: opensearch-dashboards
    server.host: "0.0.0.0"
    server.port: 5601
    server.basePath: ""
    
    # OpenSearch Connection
    opensearch.hosts: ["http://opensearch:9200"]
    opensearch.username: "admin"
    opensearch.password: "admin"
    opensearch.ssl.verificationMode: "none"
    opensearch.requestTimeout: 30000
    opensearch.shardTimeout: 30000
    
    # Logging
    logging:
      appenders:
        default:
          type: console
          layout:
            type: pattern
            pattern: "[%d{ISO8601}][%p][%c] %m%n"
      root:
        level: info
    
    # Other settings
    opensearch.logQueries: false
    opensearch.ssl.certificate: ""
    opensearch.ssl.key: ""
    opensearch.ssl.certificateAuthorities: []
    
    # UI Settings
    uiSettings.overrides:
      "defaultIndex": ""
      "timepicker:timeDefaults": "{\\"from\\": \\"now-15m\\", \\"to\\": \\"now\\"}"
      "timepicker:refreshIntervals": "[\\"100ms\\", \\"1s\\", \\"10s\\", \\"30s\\", \\"45s\\", \\"5m\\", \\"15m\\", \\"30m\\", \\"1h\\", \\"2h\\", \\"1d\\"]"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-dashboards-env
  namespace: webmethods-apigw
data:
  OPENSEARCH_HOSTS: "http://opensearch:9200"
  OPENSEARCH_USERNAME: "admin"
  OPENSEARCH_PASSWORD: "admin"
  OPENSEARCH_SSL_VERIFICATIONMODE: "none"
  NODE_TLS_REJECT_UNAUTHORIZED: "0"
