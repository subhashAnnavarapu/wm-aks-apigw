apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: webmethods-apigw
  labels:
    app: opensearch
    component: opensearch
  annotations:
    description: "Headless service for OpenSearch cluster communication"
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: opensearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
      protocol: TCP
    - name: node-comm
      port: 9300
      targetPort: 9300
      protocol: TCP
  publishNotReadyAddresses: true

---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-api
  namespace: webmethods-apigw
  labels:
    app: opensearch
    component: opensearch
  annotations:
    description: "ClusterIP service for OpenSearch REST API access"
spec:
  type: ClusterIP
  selector:
    app: opensearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-nodeport
  namespace: webmethods-apigw
  labels:
    app: opensearch
    component: opensearch
  annotations:
    description: "NodePort service for OpenSearch external access (dev/test only)"
spec:
  type: NodePort
  selector:
    app: opensearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
      protocol: TCP
      nodePort: 30920
